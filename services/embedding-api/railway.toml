# Railway config (enable in dashboard: Config-as-code → railway.toml)
# https://docs.railway.com/guides/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile CMD so PORT matches Railway networking (do not hardcode 8080)
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
