# Railway config (enable in dashboard: Config-as-code → railway.toml)
# https://docs.railway.com/guides/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# IMPORTANT: Do NOT set startCommand here or in the Railway dashboard.
# A custom start like `uvicorn ... --port $PORT` passes the literal "$PORT"
# (no shell expansion) and the app never binds correctly.
# Port binding is handled by Dockerfile CMD: ${PORT:-8080}
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
